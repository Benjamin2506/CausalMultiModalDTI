name: causal-dti

channels:
  - pytorch
  - pyg
  - nvidia
  - conda-forge
  - defaults

dependencies:

  # ==========================================================
  # Python
  # ==========================================================

  - python=3.10

  # ==========================================================
  # CUDA + PyTorch
  # ==========================================================

  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1

  # ==========================================================
  # Scientific Computing
  # ==========================================================

  - numpy=1.26.4
  - scipy=1.13.1
  - pandas=2.2.2

  - scikit-learn=1.5.0
  - statsmodels=0.14.2

  # ==========================================================
  # Molecular Processing
  # ==========================================================

  - rdkit=2023.09.6

  # ==========================================================
  # Graph Processing
  # ==========================================================

  - networkx=3.3

  # ==========================================================
  # Visualization
  # ==========================================================

  - matplotlib=3.9.0
  - seaborn=0.13.2
  - plotly=5.22.0

  # ==========================================================
  # Bioinformatics
  # ==========================================================

  - biopython=1.84

  # ==========================================================
  # Jupyter
  # ==========================================================

  - jupyter
  - notebook
  - ipykernel

  # ==========================================================
  # Utilities
  # ==========================================================

  - tqdm=4.66.4
  - joblib=1.4.2
  - requests=2.32.3
  - urllib3=2.2.1

  # ==========================================================
  # Serialization
  # ==========================================================

  - h5py=3.11.0

  # ==========================================================
  # Pip Section
  # ==========================================================

  - pip

  - pip:

      # ===============================================
      # Graph Neural Networks
      # ===============================================

      - torch-geometric==2.5.3

      # ===============================================
      # Protein Language Models
      # ===============================================

      - fair-esm==2.0.0
      - transformers==4.41.2
      - tokenizers==0.19.1
      - sentencepiece==0.2.0

      # ===============================================
      # Explainability
      # ===============================================

      - captum==0.7.0
      - shap==0.45.1

      # ===============================================
      # Dimensionality Reduction
      # ===============================================

      - umap-learn==0.5.6
      - openTSNE==1.0.2

      # ===============================================
      # Calibration
      # ===============================================

      - netcal==1.3.5

      # ===============================================
      # Docking
      # ===============================================

      - vina==1.2.5

      # ===============================================
      # Configuration
      # ===============================================

      - pyyaml==6.0.1
      - omegaconf==2.3.0

      # ===============================================
      # Deep Learning Utilities
      # ===============================================

      - einops==0.8.0
      - accelerate==0.31.0

      # ===============================================
      # Monitoring
      # ===============================================

      - tensorboard==2.17.0
      - wandb==0.17.2

      # ===============================================
      # Rich Console Output
      # ===============================================

      - rich==13.7.1