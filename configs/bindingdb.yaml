# ============================================================
# Project Configuration
# ============================================================

project_name: "causal_multimodal_dti"

experiment_name: "bindingdb_classification"

seed: 42

device: "cuda"

output_dir: "outputs/bindingdb"

checkpoint_dir: "checkpoints/bindingdb"

log_dir: "outputs/bindingdb/logs"

# ============================================================
# Dataset
# ============================================================

dataset:

  name: "BindingDB"

  task: "classification"

  raw_data_dir: "datasets/raw/bindingdb"

  processed_data_dir: "datasets/processed"

  processed_file: "bindingdb.pt"

  smiles_column: "SMILES"

  protein_column: "Target_Sequence"

  label_column: "Label"

  interaction_threshold: 1

  train_split: 0.80

  val_split: 0.10

  test_split: 0.10

  stratified_split: true

  remove_duplicates: true

  cold_start_drug: false

  cold_start_protein: false

  max_protein_length: 1024

  max_smiles_length: 256

# ============================================================
# Molecular Graph Features
# ============================================================

molecule:

  atom_features:

    - atomic_number
    - degree
    - formal_charge
    - hybridization
    - aromaticity
    - total_num_hs

  bond_features:

    - bond_type
    - conjugation
    - ring
    - stereo

# ============================================================
# Graph Transformer Encoder
# ============================================================

graph_transformer:

  input_dim: 9

  hidden_dim: 256

  output_dim: 256

  num_layers: 6

  num_heads: 8

  dropout: 0.20

  edge_dim: 32

  activation: "gelu"

  layer_norm: true

  residual: true

# ============================================================
# ESM-2 Protein Encoder
# ============================================================

protein_encoder:

  model_name: "esm2_t33_650M_UR50D"

  embedding_dim: 1280

  freeze_encoder: true

  pooling: "mean"

  max_length: 1024

# ============================================================
# Cross Modal Transformer
# ============================================================

cross_modal_transformer:

  hidden_dim: 512

  num_heads: 8

  num_layers: 4

  dropout: 0.20

  activation: "gelu"

  layer_norm: true

  residual: true

# ============================================================
# Fusion Layer
# ============================================================

fusion:

  fusion_type: "cross_attention"

  fusion_dim: 512

  dropout: 0.20

# ============================================================
# Causal Explainability Module
# ============================================================

causal_module:

  enabled: true

  intervention_probability: 0.10

  perturbation_type: "feature_masking"

  counterfactual_samples: 10

  attribution_method: "integrated_gradients"

# ============================================================
# Uncertainty Estimation
# ============================================================

uncertainty:

  enabled: true

  method: "mc_dropout"

  mc_samples: 30

  dropout_rate: 0.20

# ============================================================
# Prediction Head
# ============================================================

predictor:

  hidden_dims:

    - 512
    - 256
    - 128

  dropout: 0.20

  output_dim: 1

  activation: "sigmoid"

# ============================================================
# Training
# ============================================================

training:

  batch_size: 64

  epochs: 150

  gradient_accumulation_steps: 1

  mixed_precision: true

  num_workers: 8

  pin_memory: true

  persistent_workers: true

# ============================================================
# Optimizer
# ============================================================

optimizer:

  type: "AdamW"

  learning_rate: 0.0001

  weight_decay: 0.00001

  betas:

    - 0.9
    - 0.999

# ============================================================
# Learning Rate Scheduler
# ============================================================

scheduler:

  type: "CosineAnnealingLR"

  T_max: 150

  eta_min: 0.000001

# ============================================================
# Early Stopping
# ============================================================

early_stopping:

  enabled: true

  monitor: "val_roc_auc"

  patience: 15

  mode: "max"

# ============================================================
# Loss Function
# ============================================================

loss:

  classification_loss: "binary_cross_entropy"

  causal_regularization_weight: 0.10

  uncertainty_regularization_weight: 0.05

# ============================================================
# Evaluation Metrics
# ============================================================

metrics:

  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - pr_auc

# ============================================================
# Explainability
# ============================================================

explainability:

  generate_attention_maps: true

  generate_attribution_maps: true

  generate_counterfactual_analysis: true

  save_top_k_features: 50

# ============================================================
# Calibration
# ============================================================

calibration:

  enabled: true

  num_bins: 15

  metrics:

    - ece
    - mce
    - brier_score

# ============================================================
# Logging
# ============================================================

logging:

  use_tensorboard: true

  use_wandb: false

  log_interval: 20

  save_best_only: true

# ============================================================
# Checkpointing
# ============================================================

checkpoint:

  save_top_k: 3

  save_last: true

  monitor: "val_roc_auc"

# ============================================================
# Reproducibility
# ============================================================

reproducibility:

  deterministic: true

  benchmark: false

# ============================================================
# Hardware
# ============================================================

hardware:

  gpu_required: true

  minimum_gpu_memory_gb: 12

  recommended_gpu_memory_gb: 24